# PostgreSQL + pgvector for NeuralMemory
# Usage:
#   docker compose -f docker-compose.postgres.yml up -d
#   export POSTGRES_TEST_HOST=localhost POSTGRES_TEST_PORT=5432 POSTGRES_TEST_DB=neuralmemory_test POSTGRES_TEST_PASSWORD=postgres
#   pytest tests/storage/postgres/ -v

services:
  postgres:
    image: pgvector/pgvector:pg16-trixie
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/postgres-init.sh:/docker-entrypoint-initdb.d/init.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
    restart: unless-stopped

volumes:
  postgres_data:
